name: Seed EqualPay Demo Data VPS

on:
  workflow_dispatch:

concurrency:
  group: equalpay-vps-seed
  cancel-in-progress: false

jobs:
  seed:
    name: Seed Demo Data
    runs-on: ubuntu-latest
    environment: vps-test
    steps:
      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error::Missing GitHub Actions secret VPS_HOST."
            exit 1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error::Missing GitHub Actions secret VPS_SSH_KEY."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/equalpay_vps
          chmod 600 ~/.ssh/equalpay_vps
          ssh-keygen -y -f ~/.ssh/equalpay_vps > /dev/null
          ssh-keyscan -T 10 -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Seed demo data
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/equalpay' }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_USER:-}" ]; then
            echo "::error::Missing GitHub Actions secret VPS_USER."
            exit 1
          fi
          ssh -i ~/.ssh/equalpay_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -euo pipefail
            cd '$VPS_APP_DIR'
            if [ ! -f .env.production ]; then
              echo 'Missing .env.production on VPS in $VPS_APP_DIR.'
              exit 1
            fi
            docker compose --env-file .env.production -f deploy/docker-compose.vps.yml exec -T paytransparency npm run seed:demo
          "
