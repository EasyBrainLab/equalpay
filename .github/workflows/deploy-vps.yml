name: Deploy EqualPay VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: equalpay-vps
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: vps-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/equalpay_vps
          chmod 600 ~/.ssh/equalpay_vps
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/equalpay' }}
        run: |
          set -euo pipefail
          test -n "$VPS_USER"
          ssh -i ~/.ssh/equalpay_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/equalpay_vps -p $VPS_PORT" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.next/' \
            --exclude='.pgdata/' \
            --exclude='node_modules/' \
            --exclude='_analysis/' \
            --exclude='drive-download-*' \
            --exclude='Konzept_Einfuehrung_Entgeltsystem_Medical.md' \
            --exclude='Toolkonzept_Entgelttransparenz_HR_Suite.md' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Start application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/equalpay' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/equalpay_vps -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -euo pipefail
            cd '$VPS_APP_DIR'
            test -f .env.production
            docker compose --env-file .env.production -f deploy/docker-compose.vps.yml up -d --build
            docker compose --env-file .env.production -f deploy/docker-compose.vps.yml exec -T paytransparency npx prisma migrate deploy
            docker compose --env-file .env.production -f deploy/docker-compose.vps.yml exec -T paytransparency wget -qO- http://127.0.0.1:3000/api/health
          "
