services:
  paytransparency:
    build: .
    container_name: paytransparency-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3010:3000"
    depends_on:
      paytransparency-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  paytransparency-db:
    image: postgres:16
    container_name: paytransparency-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paytransparency
      POSTGRES_USER: paytransparency
      POSTGRES_PASSWORD: change-me
    ports:
      - "5438:5432"
    volumes:
      - paytransparency_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paytransparency -d paytransparency"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  paytransparency_pgdata:
